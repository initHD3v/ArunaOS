name: Publish Packages

on:
  push:
    branches: [main]
    paths:
      - 'packages/module-bundler/**'
      - 'packages/module-cli/**'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build @arunaos/module-bundler
        run: pnpm --filter @arunaos/module-bundler run build

      - name: Build @arunaos/module-cli
        run: pnpm --filter @arunaos/module-cli run build

      - name: Publish @arunaos/module-bundler
        run: pnpm --filter @arunaos/module-bundler publish --access=public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @arunaos/module-cli
        run: pnpm --filter @arunaos/module-cli publish --access=public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
